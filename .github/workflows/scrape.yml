name: Scrape new clips

on:
  schedule:
    # Daily at 14:00 UTC (≈ 9am EST / 6am PST) — Woot's daily digest has
    # usually landed by then.
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max unread messages to process (leave blank to drain everything).'
        required: false
        type: string
        default: ''
      inspect:
        description: 'Read-only debug: Gmail query whose first match should be dumped to the run log. Overrides limit. No state changes.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Scrape unread Woot mail and append to clips.jsonl
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          LIMIT: ${{ inputs.limit }}
          INSPECT: ${{ inputs.inspect }}
        run: |
          if [ -n "$INSPECT" ]; then
            python update.py --inspect "$INSPECT"
          elif [ -n "$LIMIT" ]; then
            python update.py --limit "$LIMIT"
          else
            python update.py
          fi

      - name: Commit and push if clips.jsonl changed
        run: |
          if git diff --quiet -- data/clips.jsonl; then
            echo "No new clips."
            exit 0
          fi
          added=$(git diff --numstat -- data/clips.jsonl | awk '{print $1}')
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/clips.jsonl
          git commit -m "Add ${added} new clip(s) from daily scrape"
          git push
