<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}The Woot Monkeys: Monte and Mortimer{% endblock %}</title>
  <meta name="description" content="A fan archive of the Monte and Mortimer dialogues from Woot's daily digest emails.">
  <link rel="icon" href="{{ base_path }}/static/favicon.ico">
  <link rel="stylesheet" href="{{ base_path }}/static/css/site.css">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Love+Ya+Like+A+Sister&family=Redressed&display=swap" rel="stylesheet">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WPJVZ6HJSP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WPJVZ6HJSP');
  </script>
</head>
<body>
  <header class="site-header">
    <div class="brand-group">
      <img class="header-mortimer" src="{{ base_path }}/static/img/header-mortimer.svg" alt="" aria-hidden="true">
      <a class="brand" href="{{ base_path }}/">Monkey Business</a>
    </div>
    <nav class="site-nav">
      <a href="{{ base_path }}/search/">Search</a>
      <a href="{{ base_path }}/random/">Random</a>
      <details class="donate-menu">
        <summary>Donate</summary>
        <div class="donate-options">
          <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_s-xclick&amp;hosted_button_id=L4448FFX778T6" target="_blank" rel="noopener">PayPal</a>
          <a href="https://venmo.com/u/batman99" target="_blank" rel="noopener">Venmo</a>
        </div>
      </details>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>An unofficial fan archive. Monte and Mortimer are trademarks of <a href="https://www.woot.com" rel="noopener">Woot Services LLC</a>.</p>
    <p>Content sourced from Woot Daily Digest emails &mdash; <a href="https://account.woot.com/signup" rel="noopener">sign up here</a>.</p>
  </footer>
</body>
</html>
