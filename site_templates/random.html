{% extends "base.html" %}
{% block title %}Random &mdash; The Woot Monkeys{% endblock %}
{% block content %}
<article class="static-page">
  <h1>Random clip</h1>
  <p id="random-status">Picking a random dialogue&hellip;</p>
  <noscript><p>This page needs JavaScript. <a href="/">Go to the latest clip instead.</a></p></noscript>
</article>
<script>
  fetch('{{ base_path }}/clips_index.json')
    .then(function (r) { return r.json(); })
    .then(function (clips) {
      var c = clips[Math.floor(Math.random() * clips.length)];
      location.replace('{{ base_path }}/' + c.id + '/');
    })
    .catch(function () {
      document.getElementById('random-status').textContent =
        "Couldn't load the clip index. Try refreshing.";
    });
</script>
{% endblock %}
